services:
  demo:
    image: sb-app
    build:
      context: .
      dockerfile: demo/Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./demo:/app:cached
      - ./db/SQL_Recipe_sample-code_20170325:/app/sql-recipes:rw
      - ~/.m2:/root/.m2
    environment:
      - JAVA_OPTS=-Dspring.devtools.restart.enabled=true -Dspring.devtools.livereload.enabled=true
    command: sh -c "mvn compile && (while true; do inotifywait -q -e modify,create,delete,move -r src/main/java; mvn compile; done) & mvn spring-boot:run"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - ./spring-book-src-master:/spring-book:cached
      - ~/.m2:/root/.m2
    environment:
      - NODE_ENV=development
    # Ensure next is accessible and listen on 0.0.0.0
    command: sh -c "apk add --no-cache maven openjdk17 && (cd /spring-book/0001-training-common && mvn install -DskipTests) && (cd /spring-book/0002-shopping-common && mvn install -DskipTests) && npm install && npx next dev -p 3000 -H 0.0.0.0"

  db:
    image: postgres:15.3-alpine3.18
    environment:
      - TZ=Asia/Tokyo
    ports:
      - 15432:5432
    env_file:
      - ./db/.env-dev
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  spring-book:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./spring-book-src-master:/app:cached
      - ~/.m2:/root/.m2
    command: tail -f /dev/null

  python-env:
    image: python:3.11-slim
    working_dir: /workspace
    ports:
      - "8082:8000"
    volumes:
      - ./python:/workspace:cached
    command: sh -c "pip install -r requirements.txt && uvicorn server:app --host 0.0.0.0 --port 8000 --reload"
